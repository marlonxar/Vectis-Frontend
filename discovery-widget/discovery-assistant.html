<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discovery Assistant</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0d0f14; color: #e8e8ea; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 60px 24px; }
    h1 { font-weight: 800; } code { background:#1c1e26; padding:2px 6px; border-radius:6px; }
    .inline-host { margin-top: 40px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Discovery Assistant</h1>
    <p>El botón flotante aparece abajo a la derecha. También hay un montaje <em>inline</em> más abajo.</p>
    <p>Las credenciales de Supabase ya van dentro del widget (<code>src/config.ts</code>); aquí solo se pasa el <code>key</code> del flujo.</p>
    <div id="da-inline" class="inline-host"></div>
  </div>

  <!-- 1) cargar el widget -->
  <script src="./dist/widget.js"></script>
  <!-- 2) inicializar (solo el key del flujo) -->
  <script>
    DiscoveryAssistant.init({ key: "websites_vectis" });
    DiscoveryAssistant.init({ key: "websites_vectis", target: "#da-inline" });
  </script>
</body>
</html>
