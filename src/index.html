  <!-- Oculta la burbuja del chatbot mientras corre la intro (solo en el home). -->
  <style>.vxc-intro .vxc-launch,.vxc-intro .vxc-panel{display:none !important}</style>
  <script>
    (function () {
      var p = (location.pathname || '/').toLowerCase().replace(/\/+$/, '') || '/';
      if (p !== '/' && p !== '/en') return;
      var html = document.documentElement;
      html.classList.add('vxc-intro');
      function reveal() { html.classList.remove('vxc-intro'); }
      // Mostramos la burbuja justo cuando TERMINA la intro (no durante).
      window.addEventListener('intro-finished', reveal);
      setTimeout(reveal, 9000); // failsafe: por si el evento no llega, no dejarla oculta para siempre
    })();
  </script>
