  <script>
    (function () {
      var loader = document.getElementById('vectis-loader');
      var t = document.getElementById('vt2-text');
      var dot = document.getElementById('vt2-dot');
      var line = document.getElementById('vt2-line');
      var word = 'Vectis', i = 0;
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      function finish(){ if (dot) dot.innerHTML = '<b>.</b>'; if (line) line.style.width = '150px'; }
      function type(){ if (i < word.length) { t.textContent = word.slice(0, ++i); setTimeout(type, 150); } else { finish(); } }
      if (reduce) { t.textContent = word; finish(); } else { setTimeout(type, 320); }
      function hide(){ if(!loader) return; loader.classList.add('hidden');
        setTimeout(function(){ if(loader) loader.style.display='none'; }, 650); }
      setTimeout(hide, 2500);
      setTimeout(function(){ if(loader) loader.style.display='none'; }, 4200);
    })();
  </script>
