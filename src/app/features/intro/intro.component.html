<div #introContainer class="intro-container" role="status" [attr.aria-label]="'INTRO.LOADING' | translate">
  <canvas #introCanvas class="intro-canvas" aria-hidden="true"></canvas>

  <div class="skip-hint" aria-hidden="true">
    <span class="keys">
      <!-- click / tap -->
      <span class="kc" title="click">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 3l13 7-5.5 1.6L11 18 6 3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </span>
      <!-- space -->
      <span class="kc kc-wide" title="space">
        <svg viewBox="0 0 40 24" fill="none"><rect x="3" y="6" width="34" height="12" rx="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M9 13v2M31 13v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </span>
      <!-- enter / return -->
      <span class="kc" title="enter">
        <svg viewBox="0 0 24 24" fill="none"><path d="M19 6v6H7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 9l-3 3 3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <!-- esc -->
      <span class="kc" title="esc">
        <svg viewBox="0 0 24 24" fill="none"><path d="M14 7l-4 4 4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 5a7 7 0 100 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </span>
      <!-- tab -->
      <span class="kc" title="tab">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 9l3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 12h7M18 7v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </span>
    </span>
    <span class="skip-text skip-desktop">{{ 'INTRO.SKIP' | translate }}</span>
    <span class="skip-text skip-mobile">{{ 'INTRO.SKIP_MOBILE' | translate }}</span>
  </div>
</div>
