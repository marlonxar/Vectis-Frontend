<section class="stats sec-dark" aria-label="stats">
  <div class="container stats-grid">
    <div class="stat">
      <span class="num" [appCountUp]="50" countSuffix="+"></span>
      <span class="label">{{ 'STATS.PROJECTS' | translate }}</span>
    </div>
    <div class="stat">
      <span class="num" [appCountUp]="98" countSuffix="%"></span>
      <span class="label">{{ 'STATS.SATISFACTION' | translate }}</span>
    </div>
    <div class="stat">
      <span class="num" [appCountUp]="5" countSuffix="x"></span>
      <span class="label">{{ 'STATS.ROI' | translate }}</span>
    </div>
    <div class="stat">
      <span class="num">24/7</span>
      <span class="label">{{ 'STATS.SUPPORT' | translate }}</span>
    </div>
  </div>
</section>
