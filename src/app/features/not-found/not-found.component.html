<main id="main-content" class="nf sec-dark">
  <section class="section nf-sec" aria-labelledby="nf-title">
    <div class="nf-bg" aria-hidden="true"><span class="nf-glow"></span></div>
    <div class="container nf-wrap">
      <p class="nf-code" aria-hidden="true">404</p>
      <p class="eyebrow on-dark">{{ 'NOTFOUND.EYEBROW' | translate }}</p>
      <h1 id="nf-title" class="nf-title">{{ 'NOTFOUND.TITLE' | translate }}</h1>
      <p class="lead on-dark nf-text">{{ 'NOTFOUND.TEXT' | translate }}</p>
      <div class="nf-actions">
        <a routerLink="/" class="btn btn-gold">{{ 'NOTFOUND.HOME' | translate }}</a>
        <a routerLink="/" fragment="contacto" class="btn btn-outline-light">{{ 'NOTFOUND.CONTACT' | translate }}</a>
      </div>
    </div>
  </section>
</main>
